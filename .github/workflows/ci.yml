# Makepad 项目 CI/CD 工作流
# 参考：https://makepad.rs/guide/appendix/packaging-guide

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  # ============================================================
  # 桌面端构建 (Native Build)
  # ============================================================
  native-build:
    name: Native Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            format: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            format: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libpulse-dev \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev

      - name: Install cargo-packager
        run: |
          cargo install cargo-packager --locked
          cargo install --locked --git https://github.com/project-robius/robius-packaging-commands.git robius-packaging-commands

      - name: Make packaging scripts executable
        run: chmod +x scripts/*.sh

      - name: Rustfmt
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

      - name: Prepare font resource directories
        shell: bash
        run: |
          # cargo-packager checks if resource source directories exist BEFORE
          # calling before-each-package-command. If they don't exist, it
          # silently skips them. So we pre-create empty directories here,
          # and before-each-package.sh fills them with actual font files.
          mkdir -p dist/resources/makepad_fonts_chinese_bold/resources
          mkdir -p dist/resources/makepad_fonts_chinese_bold_2/resources
          mkdir -p dist/resources/makepad_fonts_chinese_regular/resources
          mkdir -p dist/resources/makepad_fonts_chinese_regular_2/resources
          mkdir -p dist/resources/makepad_fonts_emoji/resources
          echo "Font resource directories created."

      - name: Package macOS app and sign
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Step 1: Build .app bundle first (without DMG)
          echo "=== Building .app bundle ==="
          cargo packager --release --formats app --verbose

          # Step 2: Re-sign the .app bundle with ad-hoc signature
          APP_BUNDLE="dist/Meal Manager.app"
          if [ -d "$APP_BUNDLE" ]; then
            echo "Re-signing $APP_BUNDLE with ad-hoc signature..."
            codesign --force --deep --sign - "$APP_BUNDLE"
            echo "Verifying signature..."
            codesign -vvv --deep "$APP_BUNDLE" 2>&1
          else
            echo "ERROR: $APP_BUNDLE not found!"
            exit 1
          fi

          # Step 3: Manually create DMG from the signed .app
          # (Don't use cargo packager --formats dmg because it would
          # re-invoke before-each-package-command and re-compile,
          # which would strip the signature we just applied)
          echo "=== Creating DMG manually ==="
          cd dist
          hdiutil create -volname "Meal Manager" -srcfolder "Meal Manager.app" -ov -format UDZO "Meal Manager_0.2.0_aarch64.dmg"
          cd ..

          echo "=== 打包后：检查 dist 目录 ==="
          ls -la dist/
          find dist -type f

      - name: Package with cargo-packager
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          echo "=== 开始打包 ==="
          cargo packager --release --formats ${{ matrix.format }} --verbose

          echo "=== 打包后：检查 dist 目录 ==="
          ls -la dist/
          find dist -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meal_manager-${{ matrix.os }}
          path: dist/*

  # ============================================================
  # WASM 构建
  # ============================================================
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install cargo-makepad
        run: |
          cargo install --git https://github.com/makepad/makepad --tag 1.0.0 cargo-makepad --force
          echo "cargo-makepad 安装完成"

      - name: Install WASM toolchain
        run: cargo makepad wasm install-toolchain

      - name: Install wasm-bindgen-cli
        run: |
          # 从 Cargo.lock 读取 wasm-bindgen 版本，确保 CLI 与项目版本一致
          WASM_BINDGEN_VERSION=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep 'version = ' | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "Installing wasm-bindgen-cli version ${WASM_BINDGEN_VERSION}"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked

      - name: Build WASM
        run: |
          echo "=== 开始构建 WASM ==="
          cargo makepad wasm --bindgen build -p meal_manager --release

          echo "=== 构建完成，检查输出 ==="
          ls -la target/makepad-wasm-app/ 2>/dev/null || echo "makepad-wasm-app 目录不存在"
          find target/makepad-wasm-app -type f 2>/dev/null | head -50

      - name: Copy font resources for WASM
        shell: bash
        run: |
          WASM_DIR="target/makepad-wasm-app/release/meal_manager"
          RESOURCES_DIR="${WASM_DIR}/resources"

          # Remove .gitkeep placeholder
          rm -f "${RESOURCES_DIR}/.gitkeep"

          # Find the makepad checkout directory
          MAKEPAD_DIR=$(find ~/.cargo/git/checkouts/makepad-* -maxdepth 2 -type d -name "widgets" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)

          if [ -n "$MAKEPAD_DIR" ] && [ -d "$MAKEPAD_DIR" ]; then
            for font_pkg in chinese_bold chinese_bold_2 chinese_regular chinese_regular_2 emoji; do
              src="$MAKEPAD_DIR/widgets/fonts/$font_pkg/resources"
              dest="$RESOURCES_DIR/makepad_fonts_$font_pkg/resources"
              if [ -d "$src" ]; then
                echo "Copying $font_pkg resources to $dest"
                mkdir -p "$dest"
                cp -r "$src"/* "$dest"/
              else
                echo "WARNING: Source directory $src does not exist!"
              fi
            done
            echo "Font resources copied for WASM."
          else
            echo "WARNING: Could not find makepad checkout directory, font resources not copied."
          fi

      - name: Package WASM
        shell: bash
        run: |
          WASM_DIR="target/makepad-wasm-app/release/meal_manager"

          # 检查目录是否存在
          if [ ! -d "${WASM_DIR}" ]; then
            echo "Error: WASM output directory not found: ${WASM_DIR}"
            echo "=== 搜索 makepad-wasm-app 目录 ==="
            find target/makepad-wasm-app -type d 2>/dev/null | head -20
            echo "=== 搜索 index.html ==="
            find target -name "index.html" 2>/dev/null | head -10
            exit 1
          fi

          echo "=== WASM 输出目录：${WASM_DIR} ==="
          ls -laR "${WASM_DIR}"

          # 打包（输出到父目录，避免 tar 读取自身）
          tar -czf "${WASM_DIR}/../meal_manager-wasm.tar.gz" -C "${WASM_DIR}" .

          echo "=== 打包完成 ==="
          ls -lh "${WASM_DIR}/../meal_manager-wasm.tar.gz"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: meal_manager-wasm
          path: target/makepad-wasm-app/release/meal_manager-wasm.tar.gz

  # ============================================================
  # 创建 GitHub Release
  # ============================================================
  release:
    name: Create Release
    needs: [native-build, wasm-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: meal_manager-*

      - name: Prepare release files
        run: |
          mkdir -p release_files

          # 检查 artifact 是否存在
          if [ ! -d "artifacts" ]; then
            echo "Error: artifacts directory not found"
            exit 1
          fi

          # 复制所有 artifact 文件
          cp -v artifacts/meal_manager-*/* release_files/

          # 验证文件已复制
          if [ ! "$(ls -A release_files)" ]; then
            echo "Error: No files copied to release_files"
            exit 1
          fi

          echo "=== 发布文件 ==="
          ls -la release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
