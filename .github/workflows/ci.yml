# Makepad 项目 CI/CD 工作流
# 参考：https://makepad.rs/guide/appendix/packaging-guide

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  # ============================================================
  # 桌面端构建 (Native Build)
  # ============================================================
  native-build:
    name: Native Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            format: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            format: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libpulse-dev \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev

      - name: Install cargo-packager
        run: |
          cargo install cargo-packager --locked
          cargo install --locked --git https://github.com/project-robius/robius-packaging-commands.git robius-packaging-commands

      - name: Make packaging scripts executable
        run: chmod +x scripts/*.sh

      - name: Rustfmt
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

      - name: Package with cargo-packager
        shell: bash
        run: |
          # cargo packager will automatically invoke before-each-package-command
          # from Cargo.toml to copy makepad resources and rebuild
          echo "=== 开始打包 ==="
          cargo packager --release --formats ${{ matrix.format }} --verbose

          echo "=== 打包后：检查 dist 目录 ==="
          ls -la dist/
          find dist -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meal_manager-${{ matrix.os }}
          path: dist/*

  # ============================================================
  # WASM 构建
  # ============================================================
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install cargo-makepad
        run: |
          cargo install --git https://github.com/makepad/makepad --tag 1.0.0 cargo-makepad --force
          echo "cargo-makepad 安装完成"

      - name: Install WASM toolchain
        run: cargo makepad wasm install-toolchain

      - name: Install wasm-bindgen-cli
        run: |
          # 从 Cargo.lock 读取 wasm-bindgen 版本，确保 CLI 与项目版本一致
          WASM_BINDGEN_VERSION=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep 'version = ' | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "Installing wasm-bindgen-cli version ${WASM_BINDGEN_VERSION}"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked

      - name: Build WASM
        run: |
          echo "=== 开始构建 WASM ==="
          cargo makepad wasm --bindgen build -p meal_manager --release

          echo "=== 构建完成，检查输出 ==="
          ls -la target/makepad-wasm-app/ 2>/dev/null || echo "makepad-wasm-app 目录不存在"
          find target/makepad-wasm-app -type f 2>/dev/null | head -50

      - name: Package WASM
        shell: bash
        run: |
          WASM_DIR="target/makepad-wasm-app/release/meal_manager"

          # 检查目录是否存在
          if [ ! -d "${WASM_DIR}" ]; then
            echo "Error: WASM output directory not found: ${WASM_DIR}"
            echo "=== 搜索 makepad-wasm-app 目录 ==="
            find target/makepad-wasm-app -type d 2>/dev/null | head -20
            echo "=== 搜索 index.html ==="
            find target -name "index.html" 2>/dev/null | head -10
            exit 1
          fi

          echo "=== WASM 输出目录：${WASM_DIR} ==="
          ls -laR "${WASM_DIR}"

          # 打包（输出到父目录，避免 tar 读取自身）
          tar -czf "${WASM_DIR}/../meal_manager-wasm.tar.gz" -C "${WASM_DIR}" .

          echo "=== 打包完成 ==="
          ls -lh "${WASM_DIR}/../meal_manager-wasm.tar.gz"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: meal_manager-wasm
          path: target/makepad-wasm-app/release/meal_manager-wasm.tar.gz

  # ============================================================
  # 创建 GitHub Release
  # ============================================================
  release:
    name: Create Release
    needs: [native-build, wasm-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: meal_manager-*

      - name: Prepare release files
        run: |
          mkdir -p release_files

          # 检查 artifact 是否存在
          if [ ! -d "artifacts" ]; then
            echo "Error: artifacts directory not found"
            exit 1
          fi

          # 复制所有 artifact 文件
          cp -v artifacts/meal_manager-*/* release_files/

          # 验证文件已复制
          if [ ! "$(ls -A release_files)" ]; then
            echo "Error: No files copied to release_files"
            exit 1
          fi

          echo "=== 发布文件 ==="
          ls -la release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
